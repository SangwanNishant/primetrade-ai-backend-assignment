version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-primetrade-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      LOG_LEVEL: info
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primetrade-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
